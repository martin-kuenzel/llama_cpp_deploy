services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: llama-cpp-server
    restart: unless-stopped
    ports:
      - "${PORT:-4242}:8080"
    volumes:
      - ${MODEL_DIR:-./}:/models
    devices:
      - /dev/dri:/dev/dri
    command: >-
      -m /models/${MODEL_NAME:-Qwen3.6-35B-A3B-Q4_K_M.gguf} --port 8080 --host 0.0.0.0 -n ${N_CTX:-512}
